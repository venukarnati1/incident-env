name: incident-env
version: "1.0"
description: "Customer incident simulation"
environment:
  entrypoint: env.environment.py
tasks:
  - id: easy
    file: env.tasks:run_easy_task
    grader: env.grader:grade_easy_task
    description: "classify issue correctly"
  - id: medium
    file: env.tasks:run_medium_task
    grader: env.grader:grade_medium_task
    description: "classify + respond correctly"
  - id: hard
    file: env.tasks:run_hard_task
    grader: env.grader:grade_hard_task
    description: "handle angry customer + escalate properly + resolve issue"
